<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="430" viewBox="0 0 1600 430" role="img" aria-labelledby="title desc">
  <title id="title">Analytic Standard sRGB to V-Log V-Gamut LUT conversion pipeline</title>
  <desc id="desc">Standard sRGB code values are linearized with the sRGB EOTF, converted from BT.709 primaries to V-Gamut, encoded with the official V-Log function, then passed through the original creative LUT.</desc>
  <rect width="1600" height="430" fill="#111317"/>
  <text x="800" y="64" fill="#f5f7fa" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="36" text-anchor="middle" font-weight="600">The analytic base-remapping pipeline</text>
  <text x="800" y="105" fill="#b8c0cc" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="23" text-anchor="middle">Known transforms are composed into a single 33-point in-camera LUT</text>

  <g font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" text-anchor="middle">
    <g>
      <rect x="65" y="165" width="250" height="132" rx="18" fill="#253451" stroke="#68a7ff" stroke-width="2"/>
      <text x="190" y="220" fill="#f5f7fa" font-size="27" font-weight="600">Standard / sRGB</text>
      <text x="190" y="258" fill="#b8c0cc" font-size="21">encoded RGB input</text>
    </g>
    <g>
      <rect x="385" y="165" width="250" height="132" rx="18" fill="#252b35" stroke="#76808f" stroke-width="2"/>
      <text x="510" y="220" fill="#f5f7fa" font-size="27" font-weight="600">sRGB EOTF</text>
      <text x="510" y="258" fill="#b8c0cc" font-size="21">linear BT.709 RGB</text>
    </g>
    <g>
      <rect x="705" y="165" width="250" height="132" rx="18" fill="#252b35" stroke="#76808f" stroke-width="2"/>
      <text x="830" y="213" fill="#f5f7fa" font-size="25" font-weight="600">BT.709 → V-Gamut</text>
      <text x="830" y="253" fill="#b8c0cc" font-size="21">official inverse matrix</text>
    </g>
    <g>
      <rect x="1025" y="165" width="250" height="132" rx="18" fill="#252b35" stroke="#76808f" stroke-width="2"/>
      <text x="1150" y="220" fill="#f5f7fa" font-size="27" font-weight="600">V-Log OETF</text>
      <text x="1150" y="258" fill="#b8c0cc" font-size="21">official encoding function</text>
    </g>
    <g>
      <rect x="1345" y="165" width="190" height="132" rx="18" fill="#4b3155" stroke="#d78bf1" stroke-width="2"/>
      <text x="1440" y="213" fill="#f5f7fa" font-size="25" font-weight="600">Original</text>
      <text x="1440" y="247" fill="#f5f7fa" font-size="25" font-weight="600">creative LUT</text>
    </g>
  </g>

  <g stroke="#b8c0cc" stroke-width="4" fill="none">
    <path d="M315 231 H370"/>
    <path d="M635 231 H690"/>
    <path d="M955 231 H1010"/>
    <path d="M1275 231 H1330"/>
  </g>
  <g fill="#b8c0cc">
    <path d="M370 231 l-14 -9 v18 z"/>
    <path d="M690 231 l-14 -9 v18 z"/>
    <path d="M1010 231 l-14 -9 v18 z"/>
    <path d="M1330 231 l-14 -9 v18 z"/>
  </g>

  <text x="800" y="360" fill="#b8c0cc" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="22" text-anchor="middle">L_STD(x) = L_original(F_sRGB→V-Log(x))</text>
  <text x="800" y="398" fill="#8f99a8" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="19" text-anchor="middle">This is a model-based approximation—not a lossless inversion of Panasonic Standard.</text>
</svg>
