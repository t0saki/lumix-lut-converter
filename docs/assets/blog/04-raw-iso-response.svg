<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Standard ISO 640 to V-Log ISO 640 RAW response ratio</title>
  <desc id="desc">Four Bayer channel slopes measured at the same aperture and shutter: R 6.0617, G1 6.0939, G2 6.0859, B 6.0654. The pooled slope is 6.0848, about 2.60 exposure values.</desc>
  <rect width="1200" height="700" fill="#111317"/>
  <text x="88" y="82" fill="#f5f7fa" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="36" font-weight="600">Same exposure, both marked ISO 640</text>
  <text x="88" y="125" fill="#b8c0cc" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="24">RAW code response: Standard ÷ V-Log (black level removed)</text>

  <line x1="130" y1="555" x2="1110" y2="555" stroke="#76808f" stroke-width="2"/>
  <line x1="130" y1="185" x2="130" y2="555" stroke="#76808f" stroke-width="2"/>
  <g fill="#9da7b4" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="20">
    <text x="88" y="562">0×</text>
    <text x="88" y="456">2×</text>
    <text x="88" y="350">4×</text>
    <text x="88" y="244">6×</text>
  </g>
  <g stroke="#303641" stroke-width="1">
    <line x1="130" y1="449" x2="1110" y2="449"/>
    <line x1="130" y1="343" x2="1110" y2="343"/>
    <line x1="130" y1="237" x2="1110" y2="237"/>
  </g>

  <g fill="#68a7ff">
    <rect x="215" y="233.7" width="140" height="321.3" rx="8"/>
    <rect x="450" y="232.0" width="140" height="323.0" rx="8"/>
    <rect x="685" y="232.4" width="140" height="322.6" rx="8"/>
    <rect x="920" y="233.5" width="140" height="321.5" rx="8"/>
  </g>
  <g fill="#f5f7fa" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" text-anchor="middle">
    <text x="285" y="219" font-size="28" font-weight="600">6.0617×</text>
    <text x="520" y="217" font-size="28" font-weight="600">6.0939×</text>
    <text x="755" y="217" font-size="28" font-weight="600">6.0859×</text>
    <text x="990" y="219" font-size="28" font-weight="600">6.0654×</text>
    <text x="285" y="595" font-size="25">R</text>
    <text x="520" y="595" font-size="25">G1</text>
    <text x="755" y="595" font-size="25">G2</text>
    <text x="990" y="595" font-size="25">B</text>
  </g>

  <rect x="335" y="625" width="530" height="48" rx="24" fill="#252b35"/>
  <text x="600" y="657" fill="#f5f7fa" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="23" text-anchor="middle">Pooled slope 6.0848×  ≈  2.60 EV</text>
</svg>
